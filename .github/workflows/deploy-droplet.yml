name: Deploy to DigitalOcean Droplet

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-system-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/droplet_key
          chmod 600 ~/.ssh/droplet_key

      - name: Trust Droplet host key
        run: |
          ssh-keyscan -H "${{ secrets.DROPLET_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on Droplet
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          APP_DIR: /opt/pr-system/pr-system
        run: |
          ssh -i ~/.ssh/droplet_key "${DROPLET_USER}@${DROPLET_HOST}" 'bash -s' <<'REMOTE'
          set -euo pipefail

          APP_DIR="/opt/pr-system/pr-system"
          cd "$APP_DIR"

          test -f .env.prod || { echo ".env.prod is missing on the Droplet"; exit 1; }

          docker volume inspect pr-system-postgres-data >/dev/null 2>&1 || {
            echo "Missing volume: pr-system-postgres-data"
            echo "Stop deploy to avoid creating an empty production database."
            exit 1
          }

          docker volume inspect pr-system_pr-system-storage >/dev/null 2>&1 || docker volume create pr-system_pr-system-storage

          git fetch origin main
          git reset --hard origin/main

          docker compose --env-file .env.prod -f docker-compose.prod.yml -p pr-system config --services

          docker compose --env-file .env.prod -f docker-compose.prod.yml -p pr-system up -d postgres

          docker run --rm \
            -v pr-system_pr-system-storage:/storage \
            postgres:16-alpine \
            sh -c 'mkdir -p /storage/pr-attachments && chown -R 1001:1001 /storage && chmod -R u+rwX /storage'

          docker compose --env-file .env.prod -f docker-compose.prod.yml -p pr-system build --no-cache pr-system-web
          docker rm -f pr-system-web 2>/dev/null || true
          docker compose --env-file .env.prod -f docker-compose.prod.yml -p pr-system up -d --no-deps pr-system-web
          docker restart ttt-rider-caddy || true

          docker ps --filter name=pr-system
          REMOTE
