services:
  web:
    container_name: pr-system-web
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    expose:
      - "3000"
    volumes:
      - pr-system-storage:/app/storage
    networks:
      - pr-system-network
      - caddy-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    container_name: pr-system-postgres
    image: postgres:16-alpine
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pr-system-postgres-data:/var/lib/postgresql/data
    networks:
      - pr-system-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pr-system-postgres-data:
  pr-system-storage:

networks:
  pr-system-network:
    name: pr-system-network
  caddy-network:
    external: true
    name: ttt-rider_default
