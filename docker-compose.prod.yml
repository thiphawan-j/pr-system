name: pr-system

services:
  postgres:
    image: postgres:16-alpine
    container_name: pr-system-db
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env.prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env.prod}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      pr-system-private:
        aliases:
          - postgres
          - pr-system-db
          - pr-system-postgres
    volumes:
      - pr-system-postgres-data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: runner
    image: pr-system-web:prod
    container_name: pr-system-web
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_URL: ${APP_URL:?Set APP_URL in .env.prod}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.prod}
      HOSTNAME: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      pr-system-private:
      caddy-external:
        aliases:
          - web
          - pr-system-web
    volumes:
      - pr-system-storage-data:/app/storage

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: migrator
    image: pr-system-migrate:prod
    container_name: pr-system-migrate
    profiles:
      - tools
    env_file:
      - .env.prod
    environment:
      APP_ENV: ${APP_ENV:-prod}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.prod}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pr-system-private

networks:
  pr-system-private:
    name: pr-system-private
    driver: bridge
    internal: true

  caddy-external:
    external: true
    name: ttt-rider_default

volumes:
  pr-system-postgres-data:
    external: true
    name: pr-system-postgres-data

  pr-system-storage-data:
    external: true 
    name: pr-system-storage-data